syntax = "proto3";

package resource;

option go_package = "github.com/accretional/proto-domain/pb";

enum InternetTLD {
  None = 0;
  COM = 1;
  // TODO bring em all in
}

message TLD {
  oneof format {
    InternetTLD internet = 1;
    string custom  = 2;
  }
}

message Domain {
  string hostname = 1;
  repeated string labels = 2;
  TLD tld = 3;
}
