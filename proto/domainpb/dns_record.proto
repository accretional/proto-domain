syntax = "proto3";

package domain;

option go_package = "github.com/accretional/proto-domain/proto/domainpb;domainpb";

import "proto/domainpb/domain.proto";

enum DNSRecordType {
  RECORD_UNKNOWN = 0;
  // Type id 1, RFC 1035. Address record. Returns a 32-bit IPv4 address; most
  // commonly used to map hostnames to an IP address, but also used for DNSBLs,
  // storing subnet masks, etc.
  A = 1;

  // Type id 2, RFC 1035. Name server record. Delegates a DNS zone to use the
  // given authoritative name servers.
  NS = 2;

  // Type id 5, RFC 1035. Canonical name record. Alias of one name to another;
  // the DNS lookup will continue by retrying the lookup with the new name.
  CNAME = 5;

  // Type id 6, RFC 1035 / RFC 2308. Start of authority record. Specifies
  // authoritative information about a DNS zone, including the primary name
  // server, the email of the domain administrator, the domain serial number,
  // and several timers relating to refreshing the zone.
  SOA = 6;

  // Type id 12, RFC 1035. PTR resource record. Pointer to a canonical name.
  // Unlike a CNAME, DNS processing stops and just the name is returned. Most
  // commonly used for reverse DNS lookups, but also for things like DNS-SD.
  PTR = 12;

  // Type id 13, RFC 8482 / RFC 1035. Host information / placeholder record.
  // Originally intended to inform about a host's OS and hardware; repurposed
  // by RFC 8482 to be used while responding to ANY queries.
  HINFO = 13;

  // Type id 15, RFC 1035 / RFC 7505. Mail exchange record. List of mail
  // exchange servers that accept email for a domain.
  MX = 15;

  // Type id 16, RFC 1035. Text record. Originally for arbitrary human-readable
  // text; now more often carries machine-readable data such as SPF, DKIM,
  // DMARC, DNS-SD, opportunistic encryption, etc.
  TXT = 16;

  // Type id 17, RFC 1183. Responsible Person. Information about the
  // responsible person(s) for the domain. Usually an email address with the
  // @ replaced by a dot.
  RP = 17;

  // Type id 18, RFC 1183. AFS database record. Location of database servers
  // of an AFS cell. Used by AFS clients to contact AFS cells outside their
  // local domain. A subtype is used by the obsolete DCE/DFS file system.
  AFSDB = 18;

  // Type id 24, RFC 2535. Signature record. Used in SIG(0) (RFC 2931) and
  // TKEY (RFC 2930). RFC 3755 designated RRSIG as the replacement for SIG
  // for use within DNSSEC.
  SIG = 24;

  // Type id 25, RFC 2535 / RFC 2930. Key record. Used only for SIG(0) and
  // TKEY. RFC 3445 limited their use to DNSSEC; RFC 3755 designates DNSKEY
  // as the replacement within DNSSEC, and RFC 4025 designates IPSECKEY as
  // the replacement for use with IPsec.
  KEY = 25;

  // Type id 28, RFC 3596. IPv6 address record. Returns a 128-bit IPv6 address,
  // most commonly used to map hostnames to an IP address of the host.
  AAAA = 28;

  // Type id 29, RFC 1876. Location record. Specifies a geographical location
  // associated with a domain name.
  LOC = 29;

  // Type id 33, RFC 2782. Service locator. Generalized service location
  // record, used for newer protocols instead of creating protocol-specific
  // records such as MX.
  SRV = 33;

  // Type id 35, RFC 3403. Naming Authority Pointer. Allows regular-expression-
  // based rewriting of domain names which can then be used as URIs, further
  // domain names to lookups, etc.
  NAPTR = 35;

  // Type id 36, RFC 2230. Key Exchanger record. Used with some cryptographic
  // systems (not DNSSEC) to identify a key management agent for the
  // associated domain name. Informational status, limited deployment.
  KX = 36;

  // Type id 37, RFC 4398. Certificate record. Stores digital certificates in
  // various forms (PKIX, SPKI, PGP, etc.).
  CERT = 37;

  // Type id 39, RFC 6672. Delegation name record. Alias for a name and all
  // its subnames, unlike CNAME, which is an alias for only the exact name.
  // Like CNAME, the DNS lookup will continue by retrying with the new name.
  DNAME = 39;

  // Type id 41, RFC 6891. OPT pseudo-record needed to support EDNS.
  OPT = 41;

  // Type id 42, RFC 3123. Address Prefix List. Specifies lists of address
  // ranges, e.g. in CIDR format, for various address families. Experimental.
  APL = 42;

  // Type id 43, RFC 4034. Delegation signer. The record used to identify the
  // DNSSEC signing key of a delegated zone.
  DS = 43;

  // Type id 44, RFC 4255. SSH public key fingerprint. Resource record for
  // publishing SSH public host key fingerprints in DNS, to aid in verifying
  // host authenticity. RFC 6594 defines ECC SSH keys and SHA-256 hashes.
  SSHFP = 44;

  // Type id 45, RFC 4025. IPsec Key. Key record that can be used with IPsec.
  IPSECKEY = 45;

  // Type id 46, RFC 4034. DNSSEC signature for a record set. Uses the same
  // format as the SIG record.
  RRSIG = 46;

  // Type id 47, RFC 4034. Next Secure record. Part of DNSSEC—used to prove
  // a name does not exist. Uses the same format as the (obsolete) NXT record.
  NSEC = 47;

  // Type id 48, RFC 4034. DNS Key record used in DNSSEC. Uses the same
  // format as the KEY record.
  DNSKEY = 48;

  // Type id 49, RFC 4701. DHCP identifier. Used in conjunction with the FQDN
  // option to DHCP.
  DHCID = 49;

  // Type id 50, RFC 5155. Next Secure record version 3. An extension to
  // DNSSEC that allows proof of nonexistence for a name without permitting
  // zone walking.
  NSEC3 = 50;

  // Type id 51, RFC 5155. NSEC3 parameters. Parameter record for use with
  // NSEC3.
  NSEC3PARAM = 51;

  // Type id 52, RFC 6698. TLSA certificate association. A record for DANE,
  // used to associate a TLS server certificate or public key with the domain
  // name where the record is found.
  TLSA = 52;

  // Type id 53, RFC 8162. S/MIME certificate association. Associates an
  // S/MIME certificate with a domain name for sender authentication.
  SMIMEA = 53;

  // Type id 55, RFC 8005. Host Identity Protocol. Method of separating the
  // end-point identifier and locator roles of IP addresses.
  HIP = 55;

  // Type id 59, RFC 7344. Child DS. Child copy of DS record, for transfer
  // to parent.
  CDS = 59;

  // Type id 60, RFC 7344. Child copy of DNSKEY record, for transfer to
  // parent.
  CDNSKEY = 60;

  // Type id 61, RFC 7929. OpenPGP public key record. A DANE method for
  // publishing and locating OpenPGP public keys in DNS for a specific email
  // address.
  OPENPGPKEY = 61;

  // Type id 62, RFC 7477. Child-to-Parent Synchronization. Specifies a
  // synchronization mechanism between a child and a parent DNS zone, e.g.
  // declaring the same NS records in both zones.
  CSYNC = 62;

  // Type id 63, RFC 8976. Message Digests for DNS Zones. Provides a
  // cryptographic message digest over DNS zone data at rest.
  ZONEMD = 63;

  // Type id 64, RFC 9460. Service Binding. Provides metadata and other
  // information that can help clients connect to the host. The more general
  // SVCB record can convey supported protocols, alternative endpoints, and
  // some types of aliasing not supported by CNAME.
  SVCB = 64;

  // Type id 65, RFC 9460. HTTPS Binding. Specialised SVCB record providing
  // connection information for HTTPS, allowing more secure connections (e.g.
  // Encrypted Client Hello) and lower first-connection latency.
  HTTPS = 65;

  // Type id 108, RFC 7043. MAC address (EUI-48). A 48-bit IEEE Extended
  // Unique Identifier.
  EUI48 = 108;

  // Type id 109, RFC 7043. MAC address (EUI-64). A 64-bit IEEE Extended
  // Unique Identifier.
  EUI64 = 109;

  // Type id 249, RFC 2930. Transaction Key record. A method of providing
  // keying material to be used with TSIG that is encrypted under the public
  // key in an accompanying KEY RR.
  TKEY = 249;

  // Type id 250, RFC 2845. Transaction Signature. Can be used to authenticate
  // dynamic updates as coming from an approved client, or to authenticate
  // responses as coming from an approved recursive name server.
  TSIG = 250;

  // Type id 251, RFC 1996. Incremental Zone Transfer. Requests a zone
  // transfer of the given zone but only differences from a previous serial
  // number. May fall back to AXFR if deltas are unavailable.
  IXFR = 251;

  // Type id 252, RFC 1035. Authoritative Zone Transfer. Transfer entire zone
  // file from the primary name server to secondary name servers.
  AXFR = 252;

  // Type id 255, RFC 1035. All cached records (commonly referred to as ANY
  // or *). Returns all records of all types known to the name server. Since
  // RFC 8482, many providers (e.g. Cloudflare) return only minimal responses
  // to ANY queries instead of enumerating records.
  ANY = 255;

  // Type id 256, RFC 7553. Uniform Resource Identifier. Can be used for
  // publishing mappings from hostnames to URIs.
  URI = 256;

  // Type id 257, RFC 8659. Certification Authority Authorization. Constrains
  // acceptable CAs for a host/domain.
  CAA = 257;

  // Type id 32768, no RFC. DNSSEC Trust Authorities. Part of a deployment
  // proposal for DNSSEC without a signed DNS root. Uses the same format as
  // the DS record.
  TA = 32768;

  // Type id 32769, RFC 4431. DNSSEC Lookaside Validation record. For
  // publishing DNSSEC trust anchors outside of the DNS delegation chain.
  // Uses the same format as the DS record; RFC 5074 describes its use.
  DLV = 32769;
}

enum Class {
  // Just interpret this as Internet for now. This enum only exists so that we stay in sync with the actual DNS spec / in case we need it later
  CLASS_UNKNOWN = 0;
  Internet = 1;
  // others are defined but seem mostly esoteric, can add if needed. May be useful to use this ourselves at some point though...
}

message DNSRecord {
  DNSRecordType type = 1;
  // Fully qualified domain name as per the DNS resource record spec. TODO - make sure this is the right structure
  Domain target = 2;
  Class class = 3;
  int32 ttl_seconds = 4;
  // TODO make indivudal dns record formats typed and oneof {} wrap them
  oneof format {
    bytes raw = 5;
    string text = 6;
  }
}
